# ---------------------------------------------------------------------------
# Site settings — hewage.io
# Minimal, data-driven Jekyll. Content lives in _data/*.yml; this file rarely
# needs touching. To add a nav item, append to `nav` below.
# ---------------------------------------------------------------------------

title: Tharindu Hewage
author: Tharindu Hewage
tagline: "Distributed systems engineer · PhD"
description: >-
  Distributed cloud systems engineer with a PhD and a rare middleware +
  node/OS-level perspective. Building reliable systems at scale.

url: "https://hewage.io"
baseurl: ""
lang: en

# Social / profile links — rendered in the header and footer.
profiles:
  github: "https://github.com/tharindu-b-hewage"
  linkedin: "https://www.linkedin.com/in/tharindu-b-hewage/"
  scholar: "https://scholar.google.com/citations?user=x7ilUIsAAAAJ&hl=en"
  medium: "https://medium.com/@tharindu-b-hewage"
  email: "tharindu.b.hewage@gmail.com"

# Top navigation. `name` is shown verbatim (terminal command style).
nav:
  - { name: "whoami",   url: "/" }
  - { name: "work",     url: "/work/" }
  - { name: "research", url: "/research/" }
  - { name: "code",     url: "/code/" }
  - { name: "resume",   url: "/resume/" }

# ---------------------------------------------------------------------------
# Build settings
# ---------------------------------------------------------------------------
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .idea

sass:
  style: compressed
